{% extends "bootstrap_template.html" %}

{% block conteudo %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <div class="card shadow rounded-4 border-0">
                <div class="card-header bg-primary text-white text-center py-3 rounded-top-4">
                    <h4 class="mb-0 fw-bold">Cadastrar Nova Pergunta</h4>
                </div>

                <div class="card-body p-4 bg-light">
                    <form method="POST">

                        <div class="mb-3">
                            <label for="enunciado_pergunta" class="form-label fw-bold">Enunciado da Pergunta</label>
                            <input type="text"
                                   id="enunciado_pergunta"
                                   name="enunciado_pergunta"
                                   class="form-control"
                                   placeholder="Ex: O que achou da temperatura da comida?"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label for="tipo_resposta" class="form-label fw-bold">Tipo da resposta</label>
                            <select id="tipo_resposta" name="tipo_resposta" class="form-select">
                                <option value="" selected disabled>Selecione um tipo...</option>
                                <option value="nota_1_5">Nota 1 - 5</option>
                                <option value="select_tag">Selecionar Tags</option>
                                <option value="texto_descritivo">Texto Descritivo</option>
                                <option value="sim_nao">Sim/Não</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label for="alvo_avaliacao" class="form-label fw-bold">Alvo da Avaliação</label>
                            <select id="alvo_avaliacao" name="alvo_avaliacao" class="form-select">
                                <option value="" selected disabled>Selecione o alvo...</option>
                                <option value="item">Item do pedido</option> <option value="estabelecimento">Estabelecimento</option>
                                <option value="entregador">Entregador</option>
                                <option value="aplicativo">Aplicativo</option>
                            </select>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                                Cadastrar Pergunta
                            </button>
                            <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary">
                                Voltar
                            </a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
